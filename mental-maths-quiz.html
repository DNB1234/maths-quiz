<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mental Maths — Quant Prep</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #222222;
      --border: #2e2e2e;
      --accent: #c8f05a;
      --accent-dim: #9bbf3a;
      --text: #f0f0f0;
      --muted: #888;
      --danger: #ff5a5a;
      --success: #5affa3;
      --radius: 10px;
      --font: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    #app {
      width: 100%;
      max-width: 480px;
    }

    /* ── Shared UI ── */
    .screen { display: none; flex-direction: column; gap: 1.5rem; }
    .screen.active { display: flex; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }

    .label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 0.85rem 1.5rem;
      border-radius: var(--radius);
      border: none;
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.1s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary {
      background: var(--accent);
      color: #111;
    }
    .btn-primary:hover { background: var(--accent-dim); }
    .btn-ghost {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { border-color: #555; }

    /* ── Start screen ── */
    .brand {
      text-align: center;
      padding: 2rem 0 1rem;
    }
    .brand h1 {
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .brand p {
      margin-top: 0.4rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .specs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }
    .spec-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.85rem 1rem;
    }
    .spec-item .spec-val {
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--accent);
    }
    .spec-item .spec-key {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ── Quiz screen ── */
    .quiz-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #timer-display {
      font-size: 2rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.04em;
      color: var(--accent);
      transition: color 0.3s;
    }
    #timer-display.urgent { color: var(--danger); }

    .score-row {
      display: flex;
      gap: 0.5rem;
      font-size: 0.8rem;
    }
    .score-pill {
      padding: 4px 10px;
      border-radius: 99px;
      font-weight: 500;
    }
    .score-pill.correct { background: rgba(90,255,163,0.12); color: var(--success); }
    .score-pill.incorrect { background: rgba(255,90,90,0.12); color: var(--danger); }

    .progress-bar-wrap {
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      background: var(--accent);
      width: 100%;
      transition: width 1s linear;
    }

    #question-display {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      text-align: center;
      line-height: 1.2;
      padding: 0.5rem 0;
    }

    /* Format badge */
    .format-badge {
      display: inline-block;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 2px 8px;
    }

    /* Multiple choice */
    #mc-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
    }

    .mc-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.9rem 0.5rem;
      font-size: 1.1rem;
      font-weight: 500;
      font-family: var(--font);
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
      text-align: center;
    }
    .mc-btn:hover { border-color: var(--accent); }
    .mc-btn.correct { border-color: var(--success); background: rgba(90,255,163,0.1); color: var(--success); }
    .mc-btn.incorrect { border-color: var(--danger); background: rgba(255,90,90,0.1); color: var(--danger); }
    .mc-btn:disabled { cursor: default; }

    /* Free input */
    #fi-form { display: flex; gap: 0.5rem; }
    #fi-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      font-size: 1.2rem;
      font-family: var(--font);
      color: var(--text);
      text-align: center;
      font-variant-numeric: tabular-nums;
      outline: none;
      transition: border-color 0.15s;
    }
    #fi-input:focus { border-color: var(--accent); }
    #fi-submit {
      flex-shrink: 0;
      padding: 0.75rem 1.2rem;
      background: var(--accent);
      color: #111;
      border: none;
      border-radius: var(--radius);
      font-size: 0.9rem;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: opacity 0.1s;
    }
    #fi-submit:hover { opacity: 0.85; }

    /* Feedback flash */
    #feedback {
      text-align: center;
      font-size: 0.85rem;
      font-weight: 500;
      min-height: 1.2em;
      color: var(--muted);
    }
    #feedback.correct { color: var(--success); }
    #feedback.incorrect { color: var(--danger); }

    /* ── Results screen ── */
    .result-headline {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .result-score-big {
      text-align: center;
      font-size: 4rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.04em;
      line-height: 1;
    }
    .result-score-label {
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: 4px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
    }
    .stat-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.85rem 1rem;
      text-align: center;
    }
    .stat-box .sv {
      font-size: 1.6rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.03em;
    }
    .stat-box .sk {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .stat-box .sv.green { color: var(--success); }
    .stat-box .sv.red { color: var(--danger); }

    @media (max-width: 380px) {
      #question-display { font-size: 1.6rem; }
      #timer-display { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ── Start Screen ── -->
  <div id="screen-start" class="screen active">
    <div class="brand">
      <h1>Mental Maths</h1>
      <p>Quant-style timed practice</p>
    </div>

    <div class="specs">
      <div class="spec-item">
        <div class="spec-val">3:00</div>
        <div class="spec-key">Session length</div>
      </div>
      <div class="spec-item">
        <div class="spec-val">Mixed</div>
        <div class="spec-key">Question format</div>
      </div>
      <div class="spec-item">
        <div class="spec-val">÷ × − +</div>
        <div class="spec-key">Operations</div>
      </div>
      <div class="spec-item">
        <div class="spec-val">Med–Hard</div>
        <div class="spec-key">Difficulty</div>
      </div>
    </div>

    <button class="btn btn-primary" id="start-btn">Start session</button>
  </div>

  <!-- ── Quiz Screen ── -->
  <div id="screen-quiz" class="screen">
    <div class="quiz-header">
      <div>
        <div class="label">Time remaining</div>
        <div id="timer-display">3:00</div>
      </div>
      <div style="text-align:right">
        <div class="label">Score</div>
        <div class="score-row" style="justify-content:flex-end; margin-top:4px;">
          <span class="score-pill correct" id="correct-count">0 ✓</span>
          <span class="score-pill incorrect" id="incorrect-count">0 ✗</span>
        </div>
      </div>
    </div>

    <div class="progress-bar-wrap">
      <div id="progress-bar"></div>
    </div>

    <div class="card">
      <div style="display:flex; justify-content:center; margin-bottom:1rem;">
        <span class="format-badge" id="format-badge">multiple choice</span>
      </div>
      <div id="question-display">—</div>
    </div>

    <!-- Multiple choice options -->
    <div id="mc-options"></div>

    <!-- Free input -->
    <div id="fi-form" style="display:none;">
      <input type="number" id="fi-input" placeholder="Answer" autocomplete="off" inputmode="decimal" />
      <button id="fi-submit">Submit</button>
    </div>

    <div id="feedback"></div>
  </div>

  <!-- ── Results Screen ── -->
  <div id="screen-results" class="screen">
    <div class="result-headline">Session complete</div>

    <div class="card" style="text-align:center; padding:2rem;">
      <div class="result-score-big" id="result-pct">—%</div>
      <div class="result-score-label">accuracy</div>
    </div>

    <div class="stats-grid">
      <div class="stat-box">
        <div class="sv" id="r-attempted">—</div>
        <div class="sk">Questions attempted</div>
      </div>
      <div class="stat-box">
        <div class="sv" id="r-avg-time">—</div>
        <div class="sk">Avg time per question</div>
      </div>
      <div class="stat-box">
        <div class="sv green" id="r-correct">—</div>
        <div class="sk">Correct</div>
      </div>
      <div class="stat-box">
        <div class="sv red" id="r-incorrect">—</div>
        <div class="sk">Incorrect</div>
      </div>
    </div>

    <button class="btn btn-primary" id="restart-btn">Start new session</button>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  QUESTION GENERATOR
//  Produces varied mental-maths questions at med–hard difficulty.
// ═══════════════════════════════════════════════════════════════

const RNG = {
  int: (min, max) => Math.floor(Math.random() * (max - min + 1)) + min,
  pick: arr => arr[Math.floor(Math.random() * arr.length)],
  bool: () => Math.random() < 0.5,
};

// Difficulty bucket weights: easy 15%, medium 40%, hard 45%
const DIFFICULTY_WEIGHTS = [
  { level: 'easy', weight: 15 },
  { level: 'medium', weight: 40 },
  { level: 'hard', weight: 45 },
];

function pickDifficulty() {
  const roll = RNG.int(1, 100);
  let cum = 0;
  for (const { level, weight } of DIFFICULTY_WEIGHTS) {
    cum += weight;
    if (roll <= cum) return level;
  }
  return 'medium';
}

// ── Question templates by operation and difficulty ──
const GENERATORS = {
  addition: {
    easy:   () => { const a = RNG.int(20, 99), b = RNG.int(20, 99); return { q: `${a} + ${b}`, a: a + b }; },
    medium: () => { const a = RNG.int(100, 499), b = RNG.int(50, 299); return { q: `${a} + ${b}`, a: a + b }; },
    hard:   () => { const a = RNG.int(250, 999), b = RNG.int(150, 750); return { q: `${a} + ${b}`, a: a + b }; },
  },
  subtraction: {
    easy:   () => { const b = RNG.int(15, 60), a = b + RNG.int(20, 80); return { q: `${a} − ${b}`, a: a - b }; },
    medium: () => { const b = RNG.int(40, 199), a = b + RNG.int(100, 350); return { q: `${a} − ${b}`, a: a - b }; },
    hard:   () => { const b = RNG.int(150, 499), a = b + RNG.int(200, 600); return { q: `${a} − ${b}`, a: a - b }; },
  },
  multiplication: {
    easy:   () => { const a = RNG.int(6, 15), b = RNG.int(6, 15); return { q: `${a} × ${b}`, a: a * b }; },
    medium: () => {
      const templates = [
        () => { const a = RNG.int(12, 30), b = RNG.int(12, 25); return { q: `${a} × ${b}`, a: a * b }; },
        () => { const a = RNG.int(15, 99), b = RNG.pick([5, 8, 15, 25]); return { q: `${a} × ${b}`, a: a * b }; },
      ];
      return RNG.pick(templates)();
    },
    hard: () => {
      const templates = [
        () => { const a = RNG.int(25, 75), b = RNG.int(15, 40); return { q: `${a} × ${b}`, a: a * b }; },
        () => { const a = RNG.int(50, 125), b = RNG.pick([11, 12, 13, 14, 15, 16]); return { q: `${a} × ${b}`, a: a * b }; },
        () => { const a = RNG.int(20, 50), b = RNG.int(20, 50); return { q: `${a} × ${b}`, a: a * b }; },
      ];
      return RNG.pick(templates)();
    },
  },
  division: {
    easy: () => {
      // Always clean division: pick divisor first, then multiply
      const b = RNG.pick([4, 5, 6, 7, 8, 9]);
      const a = b * RNG.int(6, 15);
      return { q: `${a} ÷ ${b}`, a: a / b };
    },
    medium: () => {
      const b = RNG.pick([6, 7, 8, 9, 11, 12, 13, 14, 15]);
      const a = b * RNG.int(10, 30);
      return { q: `${a} ÷ ${b}`, a: a / b };
    },
    hard: () => {
      const templates = [
        () => { const b = RNG.pick([12, 14, 15, 16, 18, 20, 22, 24, 25]); const a = b * RNG.int(15, 50); return { q: `${a} ÷ ${b}`, a: a / b }; },
        // One-decimal division (intentional)
        () => { const b = RNG.pick([4, 5, 8]); const a = b * RNG.int(10, 30) + (b / 2); return { q: `${a} ÷ ${b}`, a: +(a / b).toFixed(1) }; },
      ];
      return RNG.pick(templates)();
    },
  },
};

function generateQuestion() {
  const ops = ['addition', 'subtraction', 'multiplication', 'division'];
  const op = RNG.pick(ops);
  const diff = pickDifficulty();
  const { q, a } = GENERATORS[op][diff]();
  return { question: q, answer: a, operation: op, difficulty: diff };
}

// ═══════════════════════════════════════════════════════════════
//  DISTRACTOR GENERATOR
//  Produces 3 plausible wrong answers for multiple-choice mode.
// ═══════════════════════════════════════════════════════════════

function generateDistractors(correctAnswer, operation) {
  const ans = correctAnswer;
  const distractors = new Set();

  // Operation-specific plausible mistakes
  const strategies = {
    addition: [
      () => ans + RNG.pick([1, 2, 9, 10, 11]),
      () => ans - RNG.pick([1, 2, 9, 10, 11]),
      () => ans + RNG.pick([-20, -15, 15, 20, 100]),
      () => ans + RNG.pick([-1, 1]) * RNG.int(5, 20),
    ],
    subtraction: [
      () => ans + RNG.pick([1, 2, 9, 10, 11]),
      () => ans - RNG.pick([1, 2, 9, 10, 11]),
      () => -ans,
      () => ans + RNG.int(5, 25),
    ],
    multiplication: [
      () => ans + RNG.pick([-10, 10, -12, 12]),
      () => ans + RNG.pick([-50, 50, -100, 100]),
      () => Math.round(ans * 1.1),
      () => Math.round(ans * 0.9),
      () => ans + RNG.int(-30, 30),
    ],
    division: [
      () => +(ans + RNG.pick([1, 2, 3, 0.5])).toFixed(1),
      () => +(ans - RNG.pick([1, 2, 3, 0.5])).toFixed(1),
      () => +(ans * 2).toFixed(1),
      () => +(ans + RNG.pick([-5, 5, -10, 10])).toFixed(1),
    ],
  };

  const strats = strategies[operation] || strategies.addition;

  let attempts = 0;
  while (distractors.size < 3 && attempts < 30) {
    const fn = RNG.pick(strats);
    const val = fn();
    if (val !== ans && val > 0 && !distractors.has(val)) {
      distractors.add(val);
    }
    attempts++;
  }

  // Fallback: offset by scaled random if we couldn't get 3 plausible ones
  while (distractors.size < 3) {
    const offset = RNG.int(1, Math.max(5, Math.floor(ans * 0.15)));
    const candidate = RNG.bool() ? ans + offset : ans - offset;
    if (candidate !== ans && candidate > 0 && !distractors.has(candidate)) {
      distractors.add(candidate);
    }
  }

  return [...distractors];
}

// ═══════════════════════════════════════════════════════════════
//  TIMER LOGIC
// ═══════════════════════════════════════════════════════════════

const QUIZ_DURATION = 180; // seconds

class Timer {
  constructor(onTick, onEnd) {
    this.remaining = QUIZ_DURATION;
    this.onTick = onTick;
    this.onEnd = onEnd;
    this._id = null;
  }
  start() {
    this._id = setInterval(() => {
      this.remaining--;
      this.onTick(this.remaining);
      if (this.remaining <= 0) {
        this.stop();
        this.onEnd();
      }
    }, 1000);
  }
  stop() {
    clearInterval(this._id);
    this._id = null;
  }
  reset() {
    this.stop();
    this.remaining = QUIZ_DURATION;
  }
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${String(sec).padStart(2, '0')}`;
}

// ═══════════════════════════════════════════════════════════════
//  SCORE TRACKING
// ═══════════════════════════════════════════════════════════════

class ScoreTracker {
  constructor() { this.reset(); }
  reset() {
    this.correct = 0;
    this.incorrect = 0;
    this.attempted = 0;
    this.questionTimes = [];
    this._qStart = null;
  }
  startQuestion() { this._qStart = Date.now(); }
  record(isCorrect) {
    this.attempted++;
    if (isCorrect) this.correct++; else this.incorrect++;
    if (this._qStart !== null) {
      this.questionTimes.push((Date.now() - this._qStart) / 1000);
    }
  }
  avgTime() {
    if (!this.questionTimes.length) return 0;
    const sum = this.questionTimes.reduce((a, b) => a + b, 0);
    return (sum / this.questionTimes.length).toFixed(1);
  }
  pct() {
    if (!this.attempted) return 0;
    return Math.round((this.correct / this.attempted) * 100);
  }
}

// ═══════════════════════════════════════════════════════════════
//  UI RENDERING
// ═══════════════════════════════════════════════════════════════

const $ = id => document.getElementById(id);

let currentQuestion = null;
let currentFormat = null; // 'mc' | 'fi'
const score = new ScoreTracker();

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(`screen-${name}`).classList.add('active');
}

function updateTimerDisplay(remaining) {
  $('timer-display').textContent = formatTime(remaining);
  $('progress-bar').style.width = `${(remaining / QUIZ_DURATION) * 100}%`;
  if (remaining <= 30) $('timer-display').classList.add('urgent');
}

function updateScoreDisplay() {
  $('correct-count').textContent = `${score.correct} ✓`;
  $('incorrect-count').textContent = `${score.incorrect} ✗`;
}

// Randomly pick format (roughly 50/50)
function pickFormat() {
  return Math.random() < 0.5 ? 'mc' : 'fi';
}

function presentQuestion() {
  currentQuestion = generateQuestion();
  currentFormat = pickFormat();
  score.startQuestion();

  $('question-display').textContent = currentQuestion.question;
  $('feedback').textContent = '';
  $('feedback').className = '';

  if (currentFormat === 'mc') {
    $('format-badge').textContent = 'multiple choice';
    renderMultipleChoice();
    $('mc-options').style.display = 'grid';
    $('fi-form').style.display = 'none';
  } else {
    $('format-badge').textContent = 'free input';
    $('mc-options').style.display = 'none';
    $('fi-form').style.display = 'flex';
    $('fi-input').value = '';
    $('fi-input').focus();
  }
}

function renderMultipleChoice() {
  const { answer, operation } = currentQuestion;
  const distractors = generateDistractors(answer, operation);
  const options = [answer, ...distractors].sort(() => Math.random() - 0.5);

  const container = $('mc-options');
  container.innerHTML = '';

  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'mc-btn';
    btn.textContent = opt;
    btn.addEventListener('click', () => handleMCAnswer(opt, btn, container));
    container.appendChild(btn);
  });
}

function handleMCAnswer(chosen, clickedBtn, container) {
  // Disable all buttons
  container.querySelectorAll('.mc-btn').forEach(b => b.disabled = true);

  const correct = chosen == currentQuestion.answer;
  score.record(correct);
  updateScoreDisplay();

  clickedBtn.classList.add(correct ? 'correct' : 'incorrect');

  if (!correct) {
    // Highlight the correct one
    container.querySelectorAll('.mc-btn').forEach(b => {
      if (b.textContent == currentQuestion.answer) b.classList.add('correct');
    });
  }

  // Advance after brief flash
  setTimeout(presentQuestion, 500);
}

function handleFISubmit() {
  const raw = $('fi-input').value.trim();
  if (raw === '') return;

  const userAnswer = parseFloat(raw);
  const correct = Math.abs(userAnswer - currentQuestion.answer) < 0.05;

  score.record(correct);
  updateScoreDisplay();

  const fb = $('feedback');
  if (correct) {
    fb.textContent = '✓ Correct';
    fb.className = 'correct';
  } else {
    fb.textContent = `✗ Answer was ${currentQuestion.answer}`;
    fb.className = 'incorrect';
  }

  setTimeout(presentQuestion, 600);
}

function showResults() {
  $('result-pct').textContent = `${score.pct()}%`;
  $('r-attempted').textContent = score.attempted;
  $('r-correct').textContent = score.correct;
  $('r-incorrect').textContent = score.incorrect;
  $('r-avg-time').textContent = `${score.avgTime()}s`;
  showScreen('results');
}

// ═══════════════════════════════════════════════════════════════
//  TIMER INSTANCE
// ═══════════════════════════════════════════════════════════════

const timer = new Timer(
  (remaining) => updateTimerDisplay(remaining),
  () => showResults()
);

// ═══════════════════════════════════════════════════════════════
//  EVENT LISTENERS
// ═══════════════════════════════════════════════════════════════

$('start-btn').addEventListener('click', () => {
  score.reset();
  updateScoreDisplay();
  $('timer-display').classList.remove('urgent');
  timer.reset();
  updateTimerDisplay(QUIZ_DURATION);
  showScreen('quiz');
  timer.start();
  presentQuestion();
});

$('restart-btn').addEventListener('click', () => {
  score.reset();
  updateScoreDisplay();
  $('timer-display').classList.remove('urgent');
  timer.reset();
  updateTimerDisplay(QUIZ_DURATION);
  showScreen('quiz');
  timer.start();
  presentQuestion();
});

$('fi-submit').addEventListener('click', handleFISubmit);

$('fi-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleFISubmit();
});
</script>
</body>
</html>
